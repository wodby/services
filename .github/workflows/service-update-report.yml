name: Service Update

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      repo_filter:
        description: Optional regex to limit which README-listed service repos are inspected
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: service-update
  cancel-in-progress: false

jobs:
  discover-repos:
    runs-on: ubuntu-latest

    outputs:
      repos: ${{ steps.discover.outputs.repos }}
      repo_count: ${{ steps.discover.outputs.repo_count }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5

      - name: Build Service Matrix
        id: discover
        env:
          OWNER: wodby
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          owner = os.environ["OWNER"]
          repo_filter = os.environ.get("REPO_FILTER", "")
          readme_text = Path("README.md").read_text()

          def managed_services_table_text(text):
              lines = text.splitlines()
              start = None
              for index, line in enumerate(lines):
                  if line.strip().lower() == "## managed services":
                      start = index + 1
                      break
              if start is None:
                  return ""

              section_lines = []
              for line in lines[start:]:
                  if line.startswith("## "):
                      break
                  if line.lstrip().startswith("|"):
                      section_lines.append(line)
              return "\n".join(section_lines)

          repo_source_text = managed_services_table_text(readme_text) or readme_text
          pattern = re.compile(
              rf"https://github\.com/{re.escape(owner)}/(?P<repo>service-[A-Za-z0-9._-]+)(?:/)?(?=[)\s|]|$)",
              re.IGNORECASE,
          )
          excluded_repos = {"service"}
          repos = sorted(set(pattern.findall(repo_source_text)) - excluded_repos)

          if repo_filter:
              matcher = re.compile(repo_filter)
              repos = [repo for repo in repos if matcher.search(repo)]

          if not repos:
              raise SystemExit(f"No README-listed service repos matched repo_filter={repo_filter!r}")

          repos_json = json.dumps(repos, separators=(",", ":"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as fh:
              fh.write(f"repo_count={len(repos)}\n")
              fh.write(f"repos={repos_json}\n")

          print(f"Selected {len(repos)} repo(s):")
          for repo in repos:
              print(f"- {repo}")
          PY

      - name: Publish Discovery Summary
        env:
          REPOS_JSON: ${{ steps.discover.outputs.repos }}
          REPO_COUNT: ${{ steps.discover.outputs.repo_count }}
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os

          repos = json.loads(os.environ["REPOS_JSON"])
          print("## Update Scope")
          print("")
          print(f"- Selected repos: {os.environ['REPO_COUNT']}")
          for repo in repos:
              print(f"  - `{repo}`")
          PY

  update-report:
    name: Update Service / ${{ matrix.repo }}
    needs: discover-repos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SERVICE_REPO: ${{ matrix.repo }}

    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        repo: ${{ fromJSON(needs.discover-repos.outputs.repos) }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: python -m pip install --upgrade pip packaging pyyaml requests ruamel.yaml

      - name: Generate Service Update Report
        env:
          WODBOT_GITHUB_PAT: ${{ secrets.WODBOT_GITHUB_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          WODBY_GITHUB_TOKEN: ${{ secrets.WODBY_GITHUB_TOKEN }}
        run: |
          if [[ ! "$SERVICE_REPO" =~ ^service-[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid service repo from matrix; expected a service-* repository name."
            exit 1
          fi
          REPORT_DIR="$RUNNER_TEMP/service-update-report/$SERVICE_REPO"
          echo "REPORT_DIR=$REPORT_DIR" >> "$GITHUB_ENV"
          python scripts/service_update_report.py \
            --readme README.md \
            --owner wodby \
            --repo-filter "^${SERVICE_REPO}$" \
            --output-dir "$REPORT_DIR"

      - name: Determine Apply Scope
        id: apply-scope
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          repo = os.environ["SERVICE_REPO"]
          report_dir = Path(os.environ["REPORT_DIR"])
          report = json.loads((report_dir / "service-update-report.json").read_text())
          details = next((item for item in report["per_repo"] if item["repo"] == repo), None)
          release = (details or {}).get("planned_release") or {}
          planned_changes = (details or {}).get("planned_changes") or []
          apply_needed = bool(planned_changes and release.get("status") == "planned")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as fh:
              fh.write(f"apply_needed={str(apply_needed).lower()}\n")
          print(f"apply_needed={apply_needed}")
          PY

      - name: Check Out Service Repository
        if: steps.apply-scope.outputs.apply_needed == 'true'
        uses: actions/checkout@v5
        with:
          repository: wodby/${{ matrix.repo }}
          path: service-repo
          fetch-depth: 0
          token: ${{ secrets.WODBOT_GITHUB_PAT || secrets.WODBY_GITHUB_TOKEN || github.token }}

      - name: Apply, Commit, Push, and Tag
        if: steps.apply-scope.outputs.apply_needed == 'true'
        env:
          SERVICE_UPDATE_TOKEN: ${{ secrets.WODBOT_GITHUB_PAT || secrets.WODBY_GITHUB_TOKEN }}
        run: |
          if [[ -z "$SERVICE_UPDATE_TOKEN" ]]; then
            echo "::error::WODBOT_GITHUB_PAT or WODBY_GITHUB_TOKEN is required to push service repo updates."
            exit 1
          fi

          python scripts/service_apply_updates.py \
            --report-dir "$REPORT_DIR" \
            --owner wodby \
            --repo "$SERVICE_REPO" \
            --repo-dir service-repo

      - name: Print Full Report
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report_path = Path(os.environ["REPORT_DIR"]) / "service-update-report.md"
          print(report_path.read_text())
          PY

      - name: Publish Step Summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          repo = os.environ["SERVICE_REPO"]
          report_dir = Path(os.environ["REPORT_DIR"])
          report = json.loads((report_dir / "service-update-report.json").read_text())
          details = next((item for item in report["per_repo"] if item["repo"] == repo), None)

          print(f"## Update Result: `{repo}`")
          print("")
          print("- Scope: single service repo")
          print("- Full report: printed in the `Print Full Report` step log")
          print("")

          if repo in report.get("external_services", []):
              print("- Status: external service excluded")
          elif repo in report["missing_service_yml"]:
              print("- Status: missing `service.yml`")
          elif details and (details.get("planned_diffs") or details["updates"]):
              print("- Status: update candidate")
          elif details and details.get("notifications"):
              print("- Status: manual review notification")
          elif details and (
              details["warnings"]
              or not details.get("comparable", False)
              or (details.get("expects_image") and not details["has_image"])
              or (details.get("expects_helm") and not details["has_helm"])
              or (details.get("expects_options") and not details["has_options"])
          ):
              print("- Status: special case")
          else:
              print("- Status: no changes")
          print("")

          release = (details or {}).get("planned_release") or {}
          if release.get("status") == "planned" or (details and details.get("planned_diffs")):
              print("### Manifest Change and Git Tag")
              if release.get("status") == "planned":
                  print(f"- Git tag: `{release['tag']}`")
                  print(f"- Previous tag: `{release['previous_tag']}`")
                  print("")
                  print("#### Tag Description")
                  print(str(release.get("description") or "").rstrip())
                  print("")
              elif release.get("status") == "blocked":
                  print(f"- Git tag release blocked: {release.get('reason') or 'release tag could not be calculated'}")
                  print("")
              if details and details.get("planned_diffs"):
                  print("#### Manifest Diff")
                  for planned_diff in details["planned_diffs"]:
                      print("```diff")
                      print(str(planned_diff).rstrip())
                      print("```")
                      print("")
              print("")

          apply_result = (details or {}).get("apply_result") or {}
          if apply_result:
              print("### Apply Result")
              print(f"- Status: `{apply_result.get('status', 'unknown')}`")
              if apply_result.get("message"):
                  print(f"- Message: {apply_result['message']}")
              if apply_result.get("branch"):
                  print(f"- Branch: `{apply_result['branch']}`")
              if apply_result.get("commit"):
                  print(f"- Commit: `{apply_result['commit']}`")
              if apply_result.get("tag"):
                  print(f"- Tag: `{apply_result['tag']}`")
              changed_files = apply_result.get("changed_files") or []
              if changed_files:
                  print(f"- Changed files: {', '.join(f'`{path}`' for path in changed_files)}")
              print("")

          if details and details.get("updates_without_local_diff"):
              print("### Updates Without Local Manifest Diff")
              for message in details["updates_without_local_diff"]:
                  print(f"- {message}")
              print("")

          if details and details["current"]:
              print("### Current State")
              for message in details["current"]:
                  print(f"- {message}")
              print("")

          if details and details["warnings"]:
              print("### Warnings")
              for message in details["warnings"]:
                  print(f"- {message}")
              print("")

          if details and details.get("notifications"):
              print("### Manual Review Notifications")
              for message in details["notifications"]:
                  print(f"- {message}")
              print("")

          if repo in report["missing_service_yml"]:
              print("### Missing or Unreadable `service.yml`")
              print(f"- `{repo}`")
              print("")

          if details and (
              (details.get("expects_image") and not details["has_image"])
              or (details.get("expects_helm") and not details["has_helm"])
              or (details.get("expects_options") and not details["has_options"])
          ):
              print("### Missing Comparison Inputs")
              if details.get("expects_image") and not details["has_image"]:
                  print("- No explicit image comparison target")
              if details.get("expects_helm") and not details["has_helm"]:
                  print("- No local `helm`")
              if details.get("expects_options") and not details["has_options"]:
                  print("- No local `options`")
              print("")

          if (
              details
              and details.get("comparable")
              and not report["updates"]
              and not details["warnings"]
              and repo not in report["missing_service_yml"]
          ):
              print("No update candidates were found.")
              print("")

          print("The full markdown report is printed in the job log above.")
          PY

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-update-report-${{ matrix.repo }}
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: warn
          retention-days: 14

  notify:
    name: Notify Report Events
    needs:
      - discover-repos
      - update-report
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5

      - name: Download Report Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: reports

      - name: Send Email Digest
        env:
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
        run: |
          python scripts/service_report_email.py reports \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --event "${{ github.event_name }}" \
            --sha "${{ github.sha }}" \
            --workflow-result "${{ needs.update-report.result }}"
