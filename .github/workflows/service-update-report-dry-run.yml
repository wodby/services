name: Service Update Report Dry Run

on:
  workflow_dispatch:
    inputs:
      repo_filter:
        description: Optional regex to limit which README-listed repos are inspected
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  dry-run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: python -m pip install --upgrade pip packaging pyyaml requests

      - name: Generate Dry-Run Report
        env:
          WODBOT_GITHUB_PAT: ${{ secrets.WODBOT_GITHUB_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          WODBY_GITHUB_TOKEN: ${{ secrets.WODBY_GITHUB_TOKEN }}
        run: |
          python scripts/service_update_report.py \
            --readme README.md \
            --owner wodby \
            --repo-filter "${{ inputs.repo_filter }}" \
            --output-dir artifacts/service-update-report

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-update-report
          path: artifacts/service-update-report
          if-no-files-found: error

      - name: Publish Step Summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/service-update-report/service-update-report.json").read_text())
          print("## Dry Run Result")
          print("")
          print("- No service repos were modified by this workflow.")
          print(f"- Repos in README: {report['totals']['repos_in_readme']}")
          print(f"- Repos needing updates: {report['totals']['updates']}")
          print(f"- Fully comparable repos with no changes: {report['totals']['no_changes']}")
          print(f"- Special-case repos: {report['totals']['special']}")
          print("")
          if report["updates"]:
            print("### Update Candidates")
            for repo, messages in sorted(report["updates"].items()):
              print(f"- `{repo}`")
              for message in messages:
                print(f"  - {message}")
          else:
            print("No update candidates were found.")
          print("")
          print("The full markdown and JSON reports are attached as the `service-update-report` artifact.")
          PY
